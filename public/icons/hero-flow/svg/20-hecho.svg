<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">

  <!-- ════════════════════════════════════════════
       CÍRCULO SELLO — aro gordo estilo rotulador
       Radio exterior ~148, trazo ~22px → aro visible y potente
       ════════════════════════════════════════════ -->

  <!-- Aro exterior principal -->
  <circle cx="200" cy="200" r="138"
          fill="none" stroke="#FFFFFF" stroke-width="22"/>

  <!-- Anillo interior más fino (doble borde del sello) -->
  <circle cx="200" cy="200" r="114"
          fill="none" stroke="#FFFFFF" stroke-width="4"/>

  <!-- ════ HATCHING sutil dentro del anillo ════ -->
  <line x1="130" y1="180" x2="270" y2="180" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>
  <line x1="116" y1="196" x2="284" y2="196" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>
  <line x1="116" y1="210" x2="284" y2="210" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>
  <line x1="130" y1="224" x2="270" y2="224" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>

  <!-- ════════════════════════════════════════════
       CHECK MARK — grueso, expresivo, hand-drawn
       Recorre desde abajo-izquierda, vértice bajo-centro,
       sube a arriba-derecha
       ════════════════════════════════════════════ -->

  <!-- Sombra del check (offset +3,+3, negro semitransparente) -->
  <polyline points="125,208 172,256 278,148"
            fill="none" stroke="#000000" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.50"/>

  <!-- Check principal -->
  <polyline points="122,205 170,253 276,145"
            fill="none" stroke="#FFFFFF" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ════ TICKS PERIMETRALES del sello (8 posiciones) ════ -->
  <!-- Arriba -->
  <line x1="200" y1="50" x2="200" y2="36" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Arriba-derecha -->
  <line x1="278" y1="73" x2="287" y2="62" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Derecha -->
  <line x1="352" y1="200" x2="366" y2="200" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Abajo-derecha -->
  <line x1="278" y1="327" x2="287" y2="338" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Abajo -->
  <line x1="200" y1="350" x2="200" y2="364" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Abajo-izquierda -->
  <line x1="122" y1="327" x2="113" y2="338" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Izquierda -->
  <line x1="48" y1="200" x2="34" y2="200" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Arriba-izquierda -->
  <line x1="122" y1="73" x2="113" y2="62" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- ════ MARCAS DE ENERGÍA ════ -->
  <line x1="62" y1="62" x2="76" y2="50" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="48" y1="76" x2="59" y2="68" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="330" y1="52" x2="346" y2="68" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="338" y1="334" x2="352" y2="320" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>

</svg>
